name: Deploy Plan de Auditorías

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html styles.css app.js events.js location-manager.js branding-v17.js logo-wildtours.svg logo-aviomar.svg .nojekyll _site/
          sed -i 's/location-manager\.js?v=2/location-manager.js?v=17/g; s/Versión 14/Versión 17/g; s/Versión 15/Versión 17/g; s/Versión 16/Versión 17/g' _site/index.html
          sed -i 's#</body>#<script src="branding-v17.js?v=17"></script></body>#' _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1800000
          error_count: 60
