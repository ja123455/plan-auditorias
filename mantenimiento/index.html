<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plan de Mantenimiento</title>
<style>
:root{--azul:#1f4f78;--azul2:#2d6b9f;--fondo:#f4f6f8;--borde:#dfe3e8;--texto:#1f2937;--gris:#6b7280;--verde:#198754;--rojo:#dc3545}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--fondo);color:var(--texto)}button,input{font:inherit}button{cursor:pointer}header{padding:22px 26px;background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff}.encabezado{max-width:1700px;margin:auto;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}h1{margin:0 0 4px;font-size:29px}.sub{margin:0;color:#ffffffd9}.fecha-hoy{padding:10px 14px;border-radius:12px;background:#ffffff20;font-weight:800;text-transform:capitalize}main{max-width:1700px;margin:18px auto;padding:0 18px 30px}.barra{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}.controles,.resumen{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.mes{min-width:220px;text-align:center;font-size:21px;font-weight:900;text-transform:capitalize}.btn{border:0;border-radius:10px;padding:10px 13px;font-weight:800}.btn-azul{background:var(--azul);color:#fff}.btn-claro{background:#e9eef3;color:var(--texto)}.btn-verde{background:#eaf7ef;color:var(--verde);border:1px solid #c9ead6}.btn-rojo{background:#fff0f0;color:var(--rojo);border:1px solid #ffd0d0}.dato{min-width:105px;padding:8px 12px;border:1px solid var(--borde);border-radius:11px;background:#fff}.dato span{display:block;font-size:10px;color:var(--gris);font-weight:800;text-transform:uppercase}.dato strong{font-size:19px}.layout{display:grid;grid-template-columns:300px minmax(0,1fr);gap:16px;align-items:start}.panel,.calendario{background:#fff;border:1px solid var(--borde);border-radius:16px;box-shadow:0 8px 24px #14233214}.panel{position:sticky;top:14px;padding:18px}.panel h2{margin:0 0 14px;font-size:20px}.seleccion{padding:12px;margin-bottom:14px;border:1px solid #ccdfed;border-radius:12px;background:#eaf2f8;text-transform:capitalize}.seleccion small{display:block;color:var(--gris);font-weight:800;text-transform:uppercase}.seleccion strong{display:block;margin-top:4px}.grupo{margin-bottom:13px}label{display:block;margin-bottom:6px;color:var(--gris);font-size:13px;font-weight:800}input[type=text]{width:100%;padding:11px 12px;border:1px solid var(--borde);border-radius:10px;outline:none}input:focus{border-color:var(--azul2);box-shadow:0 0 0 3px #2d6b9f1f}.acciones-form{display:flex;gap:8px}.acciones-form button{flex:1}.separador{height:1px;background:var(--borde);margin:18px 0}.titulo-mini{font-size:13px;font-weight:900;margin:0 0 10px}.proximos{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow:auto}.proximo{width:100%;padding:9px 10px;border:1px solid var(--borde);border-left:4px solid var(--azul);border-radius:10px;background:#fff;text-align:left}.proximo.hecho{border-left-color:var(--verde);opacity:.65}.proximo strong,.proximo span{display:block}.proximo span{margin-top:3px;color:var(--gris);font-size:11px;text-transform:capitalize}.respaldo{display:flex;gap:8px}.respaldo button{flex:1}.dias-semana{display:grid;grid-template-columns:repeat(7,1fr);background:#eef2f6;border-bottom:1px solid var(--borde)}.dias-semana div{padding:11px 4px;text-align:center;font-size:12px;font-weight:900;color:#475569;text-transform:uppercase}.cuadricula{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));grid-auto-rows:minmax(118px,1fr);min-height:710px}.dia{min-width:0;padding:8px;border-right:1px solid var(--borde);border-bottom:1px solid var(--borde);background:#fff}.dia:nth-child(7n){border-right:0}.dia:hover{background:#f8fafc}.dia.fuera{background:#f7f8fa;color:#a0a7b1}.dia.hoy{background:#fff5d8}.dia.elegido{box-shadow:inset 0 0 0 3px var(--azul)}.dia-top{display:flex;justify-content:space-between;align-items:center;gap:5px;margin-bottom:7px}.numero{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:13px;font-weight:900}.hoy .numero{background:var(--azul);color:#fff}.conteo{font-size:10px;color:var(--gris);font-weight:800}.eventos{display:flex;flex-direction:column;gap:5px}.evento{display:flex;align-items:center;gap:6px;width:100%;padding:6px 7px;border:0;border-radius:7px;background:#eaf2f8;color:#173c5a;font-size:11px;font-weight:850;text-align:left;overflow:hidden}.evento:before{content:"";width:7px;height:7px;flex:0 0 7px;border-radius:50%;background:var(--azul)}.evento span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.evento.hecho{background:#eaf7ef;color:#17633b;text-decoration:line-through}.evento.hecho:before{background:var(--verde)}.mas{font-size:10px;color:var(--gris);font-weight:800;padding:2px 5px}.modal-fondo{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;background:#0f172a73;z-index:20}.modal-fondo.abierto{display:flex}.modal{width:min(430px,100%);padding:20px;border-radius:16px;background:#fff;box-shadow:0 24px 65px #0f172a47}.modal h3{margin:0}.modal p{margin:5px 0 0;color:var(--gris);text-transform:capitalize}.modal-acciones{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}.modal-acciones button{flex:1;min-width:105px}.vacio{padding:14px 4px;color:var(--gris);font-size:12px;text-align:center}@media(max-width:820px){.layout{grid-template-columns:1fr}.panel{position:static}.cuadricula{min-height:610px;grid-auto-rows:minmax(95px,1fr)}}@media(max-width:620px){main{padding:0 8px 25px}.mes{min-width:170px;font-size:18px}.cuadricula{grid-auto-rows:minmax(82px,1fr)}.dia{padding:5px}.dias-semana div{font-size:10px}.evento{padding:5px;font-size:10px}.conteo{display:none}}
</style>
</head>
<body>
<header><div class="encabezado"><div><h1>Plan de Mantenimiento</h1><p class="sub">Calendario de mantenimientos por locación</p></div><div class="fecha-hoy" id="fechaHoy"></div></div></header>
<main>
<div class="barra"><div class="controles"><button class="btn btn-claro" id="anterior">‹</button><div class="mes" id="tituloMes"></div><button class="btn btn-claro" id="siguiente">›</button><button class="btn btn-azul" id="irHoy">Hoy</button></div><div class="resumen"><div class="dato"><span>Total</span><strong id="total">0</strong></div><div class="dato"><span>Pendientes</span><strong id="pendientes">0</strong></div><div class="dato"><span>Completados</span><strong id="completados">0</strong></div></div></div>
<div class="layout"><aside class="panel"><h2 id="tituloForm">Programar mantenimiento</h2><div class="seleccion"><small>Fecha seleccionada</small><strong id="fechaSeleccionada"></strong></div><form id="form"><input type="hidden" id="idEdicion"><div class="grupo"><label for="locacion">Nombre de la locación</label><input id="locacion" type="text" maxlength="100" placeholder="Ej. Playa Mia" required autocomplete="off"></div><div class="acciones-form"><button class="btn btn-azul" id="guardar">Guardar</button><button type="button" class="btn btn-claro" id="cancelar" hidden>Cancelar</button></div></form><div class="separador"></div><p class="titulo-mini">Próximos mantenimientos</p><div class="proximos" id="listaProximos"></div><div class="separador"></div><p class="titulo-mini">Respaldo</p><div class="respaldo"><button class="btn btn-claro" id="exportar">Exportar</button><button class="btn btn-claro" id="importar">Importar</button><input id="archivo" type="file" accept="application/json" hidden></div></aside>
<section class="calendario"><div class="dias-semana"><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div></div><div class="cuadricula" id="cuadricula"></div></section></div>
</main>
<div class="modal-fondo" id="modalFondo"><div class="modal"><h3 id="modalLocacion"></h3><p id="modalFecha"></p><div class="modal-acciones"><button class="btn btn-verde" id="completar"></button><button class="btn btn-claro" id="editar">Editar</button><button class="btn btn-rojo" id="eliminar">Eliminar</button><button class="btn btn-claro" id="cerrar">Cerrar</button></div></div></div>
<script>
const $=id=>document.getElementById(id),CLAVE="aviomar_mantenimientos_v1";let datos=[],activo=null,fechaElegida=fechaLocal(new Date()),mesVisible=new Date(new Date().getFullYear(),new Date().getMonth(),1);
function fechaLocal(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function fechaObj(s){const [a,m,d]=s.split("-").map(Number);return new Date(a,m-1,d)}
function textoFecha(s){return new Intl.DateTimeFormat("es-MX",{weekday:"long",day:"numeric",month:"long",year:"numeric"}).format(fechaObj(s))}
function escapar(s){return String(s).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]))}
function cargar(){try{datos=JSON.parse(localStorage.getItem(CLAVE)||"[]");if(!Array.isArray(datos))datos=[]}catch{datos=[]}}
function guardarDatos(){localStorage.setItem(CLAVE,JSON.stringify(datos))}
function inicioCalendario(){const p=new Date(mesVisible.getFullYear(),mesVisible.getMonth(),1),dia=p.getDay(),ajuste=dia===0?-6:1-dia;return new Date(p.getFullYear(),p.getMonth(),p.getDate()+ajuste)}
function encabezado(){$("fechaHoy").textContent=textoFecha(fechaLocal(new Date()));$("tituloMes").textContent=new Intl.DateTimeFormat("es-MX",{month:"long",year:"numeric"}).format(mesVisible);$("fechaSeleccionada").textContent=textoFecha(fechaElegida)}
function resumen(){$("total").textContent=datos.length;$("pendientes").textContent=datos.filter(x=>!x.hecho).length;$("completados").textContent=datos.filter(x=>x.hecho).length}
function calendario(){encabezado();const inicio=inicioCalendario(),hoy=fechaLocal(new Date()),c=[];for(let i=0;i<42;i++){const d=new Date(inicio.getFullYear(),inicio.getMonth(),inicio.getDate()+i),f=fechaLocal(d),items=datos.filter(x=>x.fecha===f).sort((a,b)=>Number(a.hecho)-Number(b.hecho)||a.locacion.localeCompare(b.locacion,"es"));c.push(`<div class="dia ${d.getMonth()!==mesVisible.getMonth()?"fuera":""} ${f===hoy?"hoy":""} ${f===fechaElegida?"elegido":""}" data-fecha="${f}"><div class="dia-top"><span class="numero">${d.getDate()}</span>${items.length?`<span class="conteo">${items.length} mant.</span>`:""}</div><div class="eventos">${items.slice(0,4).map(x=>`<button class="evento ${x.hecho?"hecho":""}" data-id="${x.id}" title="${escapar(x.locacion)}"><span>${escapar(x.locacion)}</span></button>`).join("")}${items.length>4?`<div class="mas">+${items.length-4} más</div>`:""}</div></div>`)}$("cuadricula").innerHTML=c.join("");document.querySelectorAll(".dia").forEach(x=>x.onclick=e=>{if(e.target.closest(".evento"))return;fechaElegida=x.dataset.fecha;const d=fechaObj(fechaElegida);mesVisible=new Date(d.getFullYear(),d.getMonth(),1);reiniciarForm();pintar()});document.querySelectorAll(".evento").forEach(x=>x.onclick=e=>{e.stopPropagation();abrir(x.dataset.id)})}
function proximos(){const hoy=fechaObj(fechaLocal(new Date())),lista=datos.filter(x=>fechaObj(x.fecha)>=hoy).sort((a,b)=>fechaObj(a.fecha)-fechaObj(b.fecha)||a.locacion.localeCompare(b.locacion,"es")).slice(0,10);$("listaProximos").innerHTML=lista.length?lista.map(x=>`<button class="proximo ${x.hecho?"hecho":""}" data-id="${x.id}"><strong>${escapar(x.locacion)}</strong><span>${escapar(textoFecha(x.fecha))}</span></button>`).join(""):'<div class="vacio">No hay mantenimientos próximos.</div>';document.querySelectorAll(".proximo").forEach(x=>x.onclick=()=>abrir(x.dataset.id))}
function pintar(){calendario();resumen();proximos()}
function reiniciarForm(){$("form").reset();$("idEdicion").value="";$("tituloForm").textContent="Programar mantenimiento";$("guardar").textContent="Guardar";$("cancelar").hidden=true}
function abrir(id){const x=datos.find(y=>y.id===id);if(!x)return;activo=id;$("modalLocacion").textContent=x.locacion;$("modalFecha").textContent=textoFecha(x.fecha);$("completar").textContent=x.hecho?"Marcar pendiente":"Marcar completado";$("modalFondo").classList.add("abierto")}
function cerrar(){activo=null;$("modalFondo").classList.remove("abierto")}
$("form").onsubmit=e=>{e.preventDefault();const locacion=$("locacion").value.trim(),id=$("idEdicion").value;if(!locacion)return;if(id){const x=datos.find(y=>y.id===id);if(x){x.locacion=locacion;x.fecha=fechaElegida}}else datos.push({id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),locacion,fecha:fechaElegida,hecho:false});guardarDatos();reiniciarForm();pintar()};
$("cancelar").onclick=reiniciarForm;$("anterior").onclick=()=>{mesVisible=new Date(mesVisible.getFullYear(),mesVisible.getMonth()-1,1);pintar()};$("siguiente").onclick=()=>{mesVisible=new Date(mesVisible.getFullYear(),mesVisible.getMonth()+1,1);pintar()};$("irHoy").onclick=()=>{const d=new Date();mesVisible=new Date(d.getFullYear(),d.getMonth(),1);fechaElegida=fechaLocal(d);reiniciarForm();pintar()};$("cerrar").onclick=cerrar;$("modalFondo").onclick=e=>{if(e.target===$("modalFondo"))cerrar()};$("completar").onclick=()=>{const x=datos.find(y=>y.id===activo);if(!x)return;x.hecho=!x.hecho;guardarDatos();cerrar();pintar()};$("editar").onclick=()=>{const x=datos.find(y=>y.id===activo);if(!x)return;fechaElegida=x.fecha;const d=fechaObj(x.fecha);mesVisible=new Date(d.getFullYear(),d.getMonth(),1);$("idEdicion").value=x.id;$("locacion").value=x.locacion;$("tituloForm").textContent="Editar mantenimiento";$("guardar").textContent="Guardar cambios";$("cancelar").hidden=false;cerrar();pintar();$("locacion").focus()};$("eliminar").onclick=()=>{const x=datos.find(y=>y.id===activo);if(!x||!confirm(`¿Eliminar el mantenimiento de ${x.locacion}?`))return;datos=datos.filter(y=>y.id!==activo);guardarDatos();cerrar();pintar()};
$("exportar").onclick=()=>{const b=new Blob([JSON.stringify({mantenimientos:datos,fecha:new Date().toISOString()},null,2)],{type:"application/json"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=`respaldo-mantenimiento-${fechaLocal(new Date())}.json`;a.click();URL.revokeObjectURL(u)};$("importar").onclick=()=>$("archivo").click();$("archivo").onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const p=JSON.parse(await f.text()),arr=Array.isArray(p)?p:p.mantenimientos;if(!Array.isArray(arr))throw 0;if(confirm("Esto reemplazará la información actual. ¿Continuar?")){datos=arr;guardarDatos();pintar()}}catch{alert("El archivo no es un respaldo válido.")}e.target.value=""};document.onkeydown=e=>{if(e.key==="Escape")cerrar()};
cargar();reiniciarForm();pintar();setInterval(encabezado,60000);
</script>
</body>
</html>
